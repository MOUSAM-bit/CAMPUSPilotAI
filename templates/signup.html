<!DOCTYPE html>
<html>
<head>
    <title>CampusPilot AI - Sign Up</title>
</head>
<body>

<h2>Create Account</h2>

<form method="POST">

    <input
        type="text"
        name="name"
        placeholder="Full Name"
        required
    ><br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    ><br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    ><br><br>

    <button type="submit">
        Sign Up
    </button>

</form>

<br>

Already have an account?

<a href="/login">Login</a>

</body>
</html>
