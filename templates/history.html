<!DOCTYPE html>
<html>

<head>
    <title>Chat History</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f9;
            padding:40px;
        }

        h1{
            color:#2c3e50;
        }

        .chat{

            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);

        }

        .question{

            color:#1565c0;
            font-weight:bold;

        }

        .answer{

            margin-top:10px;

        }

        a{

            text-decoration:none;
            color:white;
            background:#1565c0;
            padding:10px 18px;
            border-radius:8px;

        }

    </style>

</head>

<body>

<h1>📜 Chat History</h1>

<br>

<a href="/">⬅ Back to Dashboard</a>

<br><br>

{% for chat in chats %}

<div class="chat">

    <div class="question">
        ❓ {{ chat[0] }}
    </div>

    <div class="answer">
        🤖 {{ chat[1] }}
    </div>

</div>

{% endfor %}

</body>

</html>
